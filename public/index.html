<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZYRA-SHOP | Belleza & Maquillaje</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header id="main-header">
            <a href="#/" class="logo">
                <span
                    style="font-size: 26px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase;">ZYRA<span
                        style="color: var(--accent);">SHOP</span></span>
            </a>

            <nav class="nav-main">
                <a href="#/" class="nav-link">Inicio</a>
                <a href="#/catalogo?categoria=1" class="nav-link">Rostro</a>
                <a href="#/catalogo?categoria=2" class="nav-link">Ojos</a>
                <a href="#/catalogo?categoria=3" class="nav-link">Labios</a>
                <a href="#/catalogo?categoria=4" class="nav-link">Skincare</a>
            </nav>

            <div class="nav-actions">
                <div class="search-btn nav-icon"><i class="fas fa-search"></i></div>
                <div class="user-btn nav-icon" id="user-btn"><i class="far fa-user"></i></div>
                <div class="cart-btn nav-icon" id="cart-btn">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count" id="cart-count">0</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Pagina Cargada Dinamicamente -->
        </main>

        <!-- Footer -->
        <footer id="main-footer"></footer>

        <!-- Panels & Overlays -->
        <div class="panel-overlay" id="overlay"></div>

        <!-- Cart Side Panel -->
        <div class="side-panel" id="cart-panel">
            <div class="panel-header">
                <h3 class="panel-title">Carrito</h3>
                <button class="panel-close" id="close-cart"><i class="fas fa-times"></i></button>
            </div>
            <div class="panel-content" id="cart-items">
                <!-- Cart items here -->
            </div>
            <div class="panel-footer" id="cart-footer">
                <div class="cart-total"
                    style="display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 700;">
                    <span>TOTAL</span>
                    <span id="cart-total-val">$0.00</span>
                </div>
                <button class="btn-dark btn-premium" style="width: 100%;" id="checkout-btn">Finalizar Compra</button>
            </div>
        </div>

        <!-- Menu Side Panel (Mobile) -->
        <div class="side-panel side-panel-left" id="menu-panel">
            <div class="panel-header">
                <h3 class="panel-title">Menú</h3>
                <button class="panel-close" id="close-menu"><i class="fas fa-times"></i></button>
            </div>
            <div class="panel-content">
                <ul class="mobile-nav">
                    <li><a href="#/"><i class="fas fa-home"></i> INICIO</a></li>
                    <li><a href="#/catalogo?genero=mujer"><i class="fas fa-venus"></i> MUJER</a></li>
                    <li><a href="#/catalogo?genero=hombre"><i class="fas fa-mars"></i> HOMBRE</a></li>
                    <li><a href="#/catalogo?nuevo=1"><i class="fas fa-star"></i> NOVEDADES</a></li>
                    <li><a href="#/nosotros"><i class="fas fa-info-circle"></i> NOSOTROS</a></li>
                </ul>
            </div>
        </div>

        <!-- Account Side Panel -->
        <div class="side-panel" id="account-panel">
            <div class="panel-header">
                <h3 class="panel-title">Mi Cuenta</h3>
                <button class="panel-close" id="close-account"><i class="fas fa-times"></i></button>
            </div>
            <div class="panel-content" id="account-menu-content">
                <!-- Content generated in app.js -->
            </div>
        </div>

        <!-- Modals -->
        <div class="modal" id="auth-modal">
            <div class="modal-content">
                <button class="panel-close" style="position: absolute; top: 20px; right: 20px;"
                    onclick="closeModal('auth-modal')"><i class="fas fa-times"></i></button>
                <div id="auth-forms">
                    <!-- Login/Signup forms -->
                </div>
            </div>
        </div>

        <!-- AI Beauty Advisor Chatbot -->
        <div id="chatbot-float" class="chatbot-float" title="Asesora de Belleza Zyra">
            <i class="fas fa-sparkles"></i>
        </div>

        <div id="chatbot-window" class="chatbot-window">
            <div class="chatbot-header">
                <div>
                    <strong>Zyra AI</strong>
                    <p style="font-size: 0.7rem; margin: 0; opacity: 0.8;">Asesora de Belleza</p>
                </div>
                <i class="fas fa-times" id="close-chatbot" style="cursor: pointer;"></i>
            </div>
            <div class="chatbot-messages" id="chatbot-messages">
                <div class="chat-msg bot">Hi! Soy Zyra AI. ✨ ¿Buscas la base perfecta o algún producto para resaltar tu
                    piel hoy?</div>
            </div>
            <div class="chatbot-input">
                <input type="text" id="chat-input" placeholder="Pregúntame algo...">
                <button id="send-chat"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <!-- WhatsApp Float -->
        <a href="https://wa.me/593986940570" target="_blank" class="whatsapp-btn" title="Contactar por WhatsApp">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <script src="app.js?v=2"></script>
</body>

</html>
